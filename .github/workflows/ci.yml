name: CI Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile --batch-mode --no-transfer-progress

      - name: Run Tests
        run: mvn test --batch-mode --no-transfer-progress

      - name: Generate build report
        if: always()
        run: mvn surefire-report:report --batch-mode --no-transfer-progress || true

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check for .env files committed
        run: |
          if git grep -r "^DB_PASSWORD=\|^SECRET_KEY=\|^API_KEY=" -- '*.env' '*.properties' 2>/dev/null; then
            echo "❌ Potential secrets found in committed files!"
            exit 1
          fi
          echo "✅ No secrets detected"
